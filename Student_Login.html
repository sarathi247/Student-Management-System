<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login Page</title>
    <link rel="stylesheet" href="S_login.css">
</head>
<body>
    <form>
        <div class="student">
            <h1 class="title">Student Managment System</h1>
            <div class="id">
                <label>Enter your Roll ID</label>
                <div>
                    <input type="text" class="roll" placeholder="Roll Number" required>
                </div>
                <p class="p1">Password</p>
                <div>
                    <input type="password" class="pass" placeholder="Password" required>
                </div>
                <input type="submit" value="Submit" class="sub"><br>
                <p class="link">
                    <a href="login.html" style=" text-decoration: none;" >Back to Home</a>
                </p>
            </div>
        </div>
    </form>
</body>
</html>
